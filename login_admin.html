<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masuk Admin - Campus Lost and Found</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-kampus-blue: #04365b;
        --color-kampus-gold: #bda678;
        --color-kampus-bg: #f8fafc;
      }
    </style>
  </head>
  <body class="bg-kampus-bg font-sans text-gray-800 flex flex-col min-h-screen antialiased">
    <header class="bg-white shadow-sm sticky top-0 z-50 px-4 md:px-8 h-20 flex justify-between items-center">
      <a href="index.html" class="font-bold text-kampus-blue text-xl md:text-2xl tracking-tight hover:opacity-80 transition-opacity"> Campus Lost and Found </a>
      <nav class="hidden md:flex items-center space-x-6">
        <a href="index.html" class="text-gray-600 hover:text-kampus-blue font-medium transition-colors">Beranda</a>
        <a href="#" class="text-gray-600 hover:text-kampus-blue font-medium transition-colors">Lapor Kehilangan</a>
        <a href="#" class="text-gray-600 hover:text-kampus-blue font-medium transition-colors">Lapor Penemuan</a>
        <a href="#" class="text-gray-600 hover:text-kampus-blue font-medium transition-colors">Dashboard</a>
      </nav>
    </header>
    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
      <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
        <div class="text-center mb-6">
          <div class="mx-auto w-12 h-12 bg-amber-50 rounded-full flex items-center justify-center text-kampus-gold mb-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
          </div>
          <h2 class="text-2xl font-bold text-kampus-blue">Portal Admin/Petugas</h2>
          <p class="text-gray-500 text-sm mt-1">Masuk untuk memverifikasi klaim dan mengelola barang temuan.</p>
        </div>
        <form class="space-y-5" action="#" method="POST">
          <div>
            <label for="admin-id" class="block text-sm font-medium text-gray-700 mb-1">Username / NIP Pegawai</label>
            <input
              id="admin-id"
              name="admin-id"
              type="text"
              required
              class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-kampus-blue focus:border-kampus-blue outline-none transition-colors"
              placeholder="Contoh: ADM10293" />
          </div>
          <div>
            <div class="flex justify-between items-center mb-1">
              <label for="password" class="text-sm font-medium text-gray-700">Password</label>
            </div>
            <input
              id="password"
              name="password"
              type="password"
              required
              class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-kampus-blue focus:border-kampus-blue outline-none transition-colors"
              placeholder="••••••••" />
          </div>
          <div class="pt-2">
            <button type="submit" class="w-full bg-kampus-blue text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-900 transition-colors shadow-md">Masuk Sistem Admin</button>
          </div>
        </form>
        <div class="mt-6 pt-4 border-t border-gray-100 text-center">
          <a href="login_mahasiswa.html" class="inline-flex items-center gap-1 text-sm text-gray-500 hover:text-kampus-blue transition-colors"> &larr; Kembali ke Portal Mahasiswa </a>
        </div>
      </div>
    </main>
    <footer class="bg-kampus-blue text-white py-8 mt-auto border-t border-blue-900">
      <p class="text-center text-sm text-gray-300">&copy; 2026 Campus Lost and Found. All rights reserved.</p>
    </footer>
  </body>
</html>
